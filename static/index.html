<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>InterviewsTracker</title>
  <meta name="description" content="Track your job applications, interviews and offers" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Interviews" />
  <link rel="apple-touch-icon" href="/icon/192" />
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            primary: '#6366f1',
            'primary-dark': '#4f46e5',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body class="h-full bg-slate-50 font-sans antialiased">

<!-- ═══════════════════════════════════════════════════ LOGIN PAGE -->
<div id="login-page" class="hidden min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 p-4">
  <div class="w-full max-w-sm">
    <!-- Logo / Brand -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center mb-4 shadow-lg shadow-indigo-900/40">
        <i class="fa-solid fa-briefcase text-white text-xl"></i>
      </div>
      <h1 class="text-white font-bold text-2xl tracking-tight">InterviewsTracker</h1>
      <p class="text-slate-400 text-sm mt-1">Your job search command center</p>
    </div>

    <!-- Auth Card -->
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
      <!-- Tabs -->
      <div id="auth-tabs" class="flex border-b border-slate-100">
        <button id="tab-login" onclick="auth.showTab('login')"
          class="auth-tab flex-1 py-3.5 text-sm font-semibold text-indigo-600 border-b-2 border-indigo-600 bg-indigo-50/60 transition-all">
          Sign In
        </button>
        <button id="tab-register" onclick="auth.showTab('register')"
          class="auth-tab flex-1 py-3.5 text-sm font-semibold text-slate-400 border-b-2 border-transparent hover:text-slate-600 transition-all hidden">
          Register
        </button>
      </div>

      <div class="p-6">
        <!-- Success -->
        <div id="auth-success" class="hidden mb-4 p-3 bg-emerald-50 border border-emerald-200 rounded-xl text-emerald-700 text-sm flex items-start gap-2">
          <i class="fa-solid fa-circle-check text-emerald-500 mt-0.5 flex-shrink-0"></i>
          <span id="auth-success-msg"></span>
        </div>
        <!-- Error -->
        <div id="auth-error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm flex items-start gap-2">
          <i class="fa-solid fa-circle-xmark text-red-500 mt-0.5 flex-shrink-0"></i>
          <span id="auth-error-msg"></span>
        </div>

        <!-- Sign In Form -->
        <form id="login-form" class="space-y-4" onsubmit="auth.submitLogin(event)">
          <div>
            <label class="form-label"><i class="fa-solid fa-user text-slate-400 mr-1.5"></i>Username</label>
            <input id="login-username" type="text" placeholder="Enter your username"
              class="form-input" autocomplete="username" />
          </div>
          <div>
            <label class="form-label"><i class="fa-solid fa-lock text-slate-400 mr-1.5"></i>Password</label>
            <div class="relative">
              <input id="login-password" type="password" placeholder="Enter your password"
                class="form-input pr-10" autocomplete="current-password" />
              <button type="button" onclick="auth.togglePassword('login-password', this)"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors">
                <i class="fa-solid fa-eye text-sm"></i>
              </button>
            </div>
          </div>
          <button type="submit" id="login-btn"
            class="w-full btn-primary justify-center py-2.5">
            <i class="fa-solid fa-arrow-right-to-bracket"></i>Sign In
          </button>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="space-y-4 hidden" onsubmit="auth.submitRegister(event)">
          <div>
            <label class="form-label"><i class="fa-solid fa-user text-slate-400 mr-1.5"></i>Username <span class="text-red-500">*</span></label>
            <input id="reg-username" type="text" placeholder="Choose a username (min 3 chars)"
              class="form-input" autocomplete="username" />
          </div>
          <div>
            <label class="form-label"><i class="fa-solid fa-id-card text-slate-400 mr-1.5"></i>Display Name</label>
            <input id="reg-name" type="text" placeholder="Your full name (optional)" class="form-input" />
          </div>
          <div>
            <label class="form-label"><i class="fa-solid fa-envelope text-slate-400 mr-1.5"></i>Email</label>
            <input id="reg-email" type="email" placeholder="your@email.com (optional)" class="form-input" />
          </div>
          <div>
            <label class="form-label"><i class="fa-solid fa-lock text-slate-400 mr-1.5"></i>Password <span class="text-red-500">*</span></label>
            <div class="relative">
              <input id="reg-password" type="password" placeholder="Min 6 characters"
                class="form-input pr-10" autocomplete="new-password" />
              <button type="button" onclick="auth.togglePassword('reg-password', this)"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors">
                <i class="fa-solid fa-eye text-sm"></i>
              </button>
            </div>
          </div>
          <button type="submit" id="register-btn"
            class="w-full btn-primary justify-center py-2.5">
            <i class="fa-solid fa-user-plus"></i>Create Account
          </button>
        </form>

        <!-- Google OAuth -->
        <div id="google-auth-section" class="hidden">
          <div class="relative my-5">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div>
            <div class="relative flex justify-center"><span class="text-xs text-slate-400 bg-white px-3">or continue with</span></div>
          </div>
          <button onclick="auth.loginWithGoogle()"
            class="w-full flex items-center justify-center gap-3 bg-white hover:bg-slate-50 text-slate-700 font-medium py-2.5 px-4 rounded-xl border border-slate-200 shadow-sm transition-all hover:shadow-md">
            <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google" class="w-4 h-4" />
            Continue with Google
          </button>
        </div>
      </div>
    </div>
    <p class="text-center text-slate-500 text-xs mt-5">All data is private to your account.</p>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════ APP SHELL -->
<div id="app-shell" class="hidden h-full">

  <!-- Sidebar overlay (mobile) -->
  <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-20 hidden" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="w-64 bg-slate-900 flex flex-col fixed inset-y-0 left-0 z-30">
    <!-- Logo -->
    <div class="flex items-center justify-between px-4 py-4 border-b border-white/10 flex-shrink-0">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-indigo-600 rounded-xl flex items-center justify-center flex-shrink-0">
          <i class="fa-solid fa-briefcase text-white text-xs"></i>
        </div>
        <span class="text-white font-bold text-base tracking-tight">InterviewsTracker</span>
      </div>
      <button onclick="closeSidebar()" class="lg:hidden text-slate-500 hover:text-white p-1 rounded-lg transition-colors">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-3 py-4 overflow-y-auto space-y-0.5">
      <button onclick="navTo('dashboard')" class="nav-link w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-white/8 transition-all text-sm font-medium" data-page="dashboard">
        <i class="fa-solid fa-gauge-high w-4 text-center text-sm"></i>
        Dashboard
      </button>
      <button onclick="navTo('applications')" class="nav-link w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-white/8 transition-all text-sm font-medium" data-page="applications">
        <i class="fa-solid fa-file-lines w-4 text-center text-sm"></i>
        Applications
        <span id="app-count-badge" class="ml-auto bg-indigo-600 text-white text-xs font-bold px-1.5 py-0.5 rounded-full hidden"></span>
      </button>
      <button onclick="navTo('companies')" class="nav-link w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-white/8 transition-all text-sm font-medium" data-page="companies">
        <i class="fa-solid fa-building w-4 text-center text-sm"></i>
        Companies
      </button>
      <button onclick="navTo('contacts')" class="nav-link w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-white/8 transition-all text-sm font-medium" data-page="contacts">
        <i class="fa-solid fa-address-book w-4 text-center text-sm"></i>
        Contacts
      </button>
      <button onclick="navTo('settings')" class="nav-link w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-white/8 transition-all text-sm font-medium" data-page="settings">
        <i class="fa-solid fa-robot w-4 text-center text-sm"></i>
        Email Agent
      </button>
      <li id="admin-nav-item" class="hidden list-none">
        <button onclick="navTo('admin')" class="nav-link w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-white/8 transition-all text-sm font-medium" data-page="admin">
          <i class="fa-solid fa-shield-halved w-4 text-center text-sm text-amber-400"></i>
          Admin
          <span id="pending-count-badge" class="ml-auto bg-red-500 text-white text-xs font-bold px-1.5 py-0.5 rounded-full hidden"></span>
        </button>
      </li>

      <!-- Quick Filters -->
      <div class="mt-5 pt-4 border-t border-white/8">
        <p class="text-slate-500 text-[10px] font-700 uppercase tracking-[0.1em] px-3 mb-2">Quick Filters</p>
        <button onclick="navTo('applications', {result:'Selected'})" class="nav-link w-full flex items-center gap-3 px-3 py-2 rounded-xl text-slate-400 hover:text-white hover:bg-white/8 transition-all text-sm">
          <i class="fa-solid fa-circle-check text-emerald-500 w-4 text-center text-sm"></i>
          Selections
        </button>
        <button onclick="navTo('applications', {stage:'Offer'})" class="nav-link w-full flex items-center gap-3 px-3 py-2 rounded-xl text-slate-400 hover:text-white hover:bg-white/8 transition-all text-sm">
          <i class="fa-solid fa-envelope-open-text text-amber-400 w-4 text-center text-sm"></i>
          Offers
        </button>
      </div>
    </nav>

    <!-- User Profile -->
    <div class="px-3 py-3 border-t border-white/10 flex-shrink-0">
      <div class="flex items-center gap-3 px-2 py-2">
        <img id="user-avatar" src="" alt="" class="w-8 h-8 rounded-full object-cover bg-slate-700 flex-shrink-0" />
        <div class="flex-1 min-w-0">
          <p id="user-name" class="text-white text-sm font-semibold truncate leading-tight"></p>
          <p id="user-email" class="text-slate-500 text-xs truncate"></p>
        </div>
        <button onclick="auth.logout()" title="Logout"
          class="text-slate-500 hover:text-red-400 transition-colors p-1.5 rounded-lg hover:bg-white/5 flex-shrink-0">
          <i class="fa-solid fa-arrow-right-from-bracket text-sm"></i>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main wrapper -->
  <div class="lg:ml-64 flex flex-col min-h-screen">
    <!-- Header -->
    <header class="bg-white/95 backdrop-blur-sm border-b border-slate-200 px-4 sm:px-6 lg:px-8 py-3.5 flex items-center justify-between sticky top-0 z-10">
      <div class="flex items-center gap-3 min-w-0">
        <button onclick="openSidebar()" class="lg:hidden p-2 -ml-1 text-slate-500 hover:text-slate-800 hover:bg-slate-100 rounded-xl transition-colors flex-shrink-0">
          <i class="fa-solid fa-bars text-lg"></i>
        </button>
        <div class="min-w-0">
          <h1 id="page-title" class="text-base sm:text-lg font-bold text-slate-800 truncate leading-tight"></h1>
          <p id="page-subtitle" class="text-slate-400 text-xs truncate hidden sm:block"></p>
        </div>
      </div>
      <div id="page-actions" class="flex items-center gap-2 flex-shrink-0 ml-3"></div>
    </header>

    <!-- Page Content -->
    <div id="page-content" class="flex-1 p-4 sm:p-6 lg:p-8"></div>
  </div>
</div>

<!-- Bottom Navigation (mobile) -->
<nav id="bottom-nav" class="fixed bottom-0 inset-x-0 bg-white border-t border-slate-200 z-10 lg:hidden bnav-safe hidden">
  <div class="flex justify-around items-center h-14 px-1">
    <button onclick="navTo('dashboard')" class="bottom-nav-btn flex flex-col items-center justify-center gap-0.5 py-1.5 px-3 text-slate-400 transition-colors min-w-[56px]" data-page="dashboard">
      <i class="fa-solid fa-gauge-high text-lg"></i>
      <span class="text-[10px] font-medium leading-none">Home</span>
    </button>
    <button onclick="navTo('applications')" class="bottom-nav-btn flex flex-col items-center justify-center gap-0.5 py-1.5 px-3 text-slate-400 transition-colors min-w-[56px]" data-page="applications">
      <i class="fa-solid fa-file-lines text-lg"></i>
      <span class="text-[10px] font-medium leading-none">Apply</span>
    </button>
    <button onclick="navTo('companies')" class="bottom-nav-btn flex flex-col items-center justify-center gap-0.5 py-1.5 px-3 text-slate-400 transition-colors min-w-[56px]" data-page="companies">
      <i class="fa-solid fa-building text-lg"></i>
      <span class="text-[10px] font-medium leading-none">Companies</span>
    </button>
    <button onclick="navTo('contacts')" class="bottom-nav-btn flex flex-col items-center justify-center gap-0.5 py-1.5 px-3 text-slate-400 transition-colors min-w-[56px]" data-page="contacts">
      <i class="fa-solid fa-address-book text-lg"></i>
      <span class="text-[10px] font-medium leading-none">Contacts</span>
    </button>
    <button onclick="navTo('settings')" class="bottom-nav-btn flex flex-col items-center justify-center gap-0.5 py-1.5 px-3 text-slate-400 transition-colors min-w-[56px]" data-page="settings">
      <i class="fa-solid fa-robot text-lg"></i>
      <span class="text-[10px] font-medium leading-none">Agent</span>
    </button>
  </div>
</nav>

<!-- Modal -->
<div id="modal-overlay" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
  <div id="modal-box" class="bg-white rounded-t-3xl sm:rounded-2xl shadow-2xl w-full sm:max-w-2xl max-h-[92vh] sm:max-h-[90vh] overflow-hidden flex flex-col">
    <!-- Drag handle (mobile only) -->
    <div class="modal-drag-handle flex justify-center pt-3 pb-1 flex-shrink-0">
      <div class="w-10 h-1 bg-slate-200 rounded-full"></div>
    </div>
    <div class="flex items-center justify-between px-5 py-3 border-b border-slate-100 flex-shrink-0">
      <h2 id="modal-title" class="text-base font-semibold text-slate-800"></h2>
      <button onclick="modal.close()" class="text-slate-400 hover:text-slate-600 transition-colors p-1.5 rounded-lg hover:bg-slate-100">
        <i class="fa-solid fa-xmark text-lg"></i>
      </button>
    </div>
    <div id="modal-body" class="flex-1 overflow-y-auto p-5 sm:p-6"></div>
    <div id="modal-footer" class="px-5 py-4 border-t border-slate-100 flex justify-end gap-2.5 flex-shrink-0 bg-slate-50/80"></div>
  </div>
</div>

<!-- Toast Container -->
<div id="toast-container" class="fixed bottom-20 lg:bottom-4 right-3 z-50 flex flex-col gap-2 pointer-events-none max-w-xs sm:max-w-sm"></div>

<!-- Loading Overlay -->
<div id="loading-overlay" class="hidden fixed inset-0 bg-white/80 backdrop-blur-sm z-50 flex items-center justify-center">
  <div class="text-center">
    <div class="w-10 h-10 border-3 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mx-auto mb-3" style="border-width:3px"></div>
    <p class="text-slate-600 font-medium text-sm">Loading...</p>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/components.js"></script>
<script src="/static/js/dashboard.js"></script>
<script src="/static/js/companies.js"></script>
<script src="/static/js/applications.js"></script>
<script src="/static/js/interviews.js"></script>
<script src="/static/js/contacts.js"></script>
<script src="/static/js/admin.js"></script>
<script src="/static/js/settings.js"></script>
<script src="/static/js/agent.js"></script>
<script src="/static/js/router.js"></script>
<script src="/static/js/main.js"></script>

<script>
  function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebar-overlay').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.add('hidden');
    document.body.style.overflow = '';
  }
  function navTo(page, params) {
    closeSidebar();
    router.navigate(page, params);
  }
</script>
</body>
</html>
